services:
  postgres:
    image: postgres:16.2-alpine
    environment:
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-appdb}
      POSTGRES_USER: ${APP_DB_USER:-appdb}
      POSTGRES_DB: ${APP_DB_NAME:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-appdb} -d ${APP_DB_NAME:-appdb}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
