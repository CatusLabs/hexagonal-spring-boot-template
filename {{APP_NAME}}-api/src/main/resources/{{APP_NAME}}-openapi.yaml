openapi: 3.1.0
info:
  title: {{APP_NAME_PASCAL}} API
  description: REST API for {{APP_NAME_PASCAL}}
  version: 0.0.1-SNAPSHOT
  contact:
    name: {{ORG_NAME}}
    url: https://github.com/{{ORG_NAME}}/{{APP_NAME}}

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Health check operations

paths:
  /api/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns application health status
      operationId: healthCheck
      responses:
        '200':
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
        timestamp:
          type: string
          format: date-time

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
