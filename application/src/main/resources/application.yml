spring:
  application:
    name: {{APP_NAME}}
  datasource:
    url: jdbc:postgresql://localhost:5432/${APP_DB_NAME:appdb}
    username: ${APP_DB_USER:appdb}
    password: ${APP_DB_PASSWORD:appdb}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma3:12b
          temperature: 0.2

server:
  port: 8080
